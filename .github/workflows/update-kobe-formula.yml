name: Update kobe Formula

on:
  repository_dispatch:
    types: [update-kobe-formula]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to update to (without v prefix)'
        required: true
      channel:
        description: 'Release channel'
        required: false
        type: choice
        options:
          - stable
          - unstable
        default: stable
      sha256_aarch64:
        description: 'SHA256 of kobe-aarch64-apple-darwin.tar.gz'
        required: true
      sha256_x86_64:
        description: 'SHA256 of kobe-x86_64-apple-darwin.tar.gz'
        required: true
      sha256_linux_aarch64:
        description: 'SHA256 of kobe-aarch64-unknown-linux-musl.tar.gz'
        required: true
      sha256_linux_x86_64:
        description: 'SHA256 of kobe-x86_64-unknown-linux-musl.tar.gz'
        required: true

jobs:
  # Step 1: render the formula and push it to an update branch (no direct push
  # to main — mirrors the Cask updater's validated-PR flow in update-cask.yaml).
  update-formula:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.params.outputs.version }}
      channel: ${{ steps.params.outputs.channel }}
      formula_file: ${{ steps.formula.outputs.file }}
      formula_label: ${{ steps.formula.outputs.label }}
      changed: ${{ steps.diff.outputs.changed }}
      branch: ${{ steps.branch.outputs.name }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve params (version, channel, sha256)
        id: params
        env:
          DISPATCH_VERSION: ${{ github.event.client_payload.version }}
          DISPATCH_CHANNEL: ${{ github.event.client_payload.channel }}
          DISPATCH_SHA256_AARCH64: ${{ github.event.client_payload.sha256_aarch64 }}
          DISPATCH_SHA256_X86_64: ${{ github.event.client_payload.sha256_x86_64 }}
          DISPATCH_SHA256_LINUX_AARCH64: ${{ github.event.client_payload.sha256_linux_aarch64 }}
          DISPATCH_SHA256_LINUX_X86_64: ${{ github.event.client_payload.sha256_linux_x86_64 }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          INPUT_CHANNEL: ${{ github.event.inputs.channel }}
          INPUT_SHA256_AARCH64: ${{ github.event.inputs.sha256_aarch64 }}
          INPUT_SHA256_X86_64: ${{ github.event.inputs.sha256_x86_64 }}
          INPUT_SHA256_LINUX_AARCH64: ${{ github.event.inputs.sha256_linux_aarch64 }}
          INPUT_SHA256_LINUX_X86_64: ${{ github.event.inputs.sha256_linux_x86_64 }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "repository_dispatch" ]; then
            VERSION="$DISPATCH_VERSION"
            CHANNEL_RAW="$DISPATCH_CHANNEL"
            SHA256_AARCH64="$DISPATCH_SHA256_AARCH64"
            SHA256_X86_64="$DISPATCH_SHA256_X86_64"
            SHA256_LINUX_AARCH64="$DISPATCH_SHA256_LINUX_AARCH64"
            SHA256_LINUX_X86_64="$DISPATCH_SHA256_LINUX_X86_64"
          else
            VERSION="$INPUT_VERSION"
            CHANNEL_RAW="$INPUT_CHANNEL"
            SHA256_AARCH64="$INPUT_SHA256_AARCH64"
            SHA256_X86_64="$INPUT_SHA256_X86_64"
            SHA256_LINUX_AARCH64="$INPUT_SHA256_LINUX_AARCH64"
            SHA256_LINUX_X86_64="$INPUT_SHA256_LINUX_X86_64"
          fi

          # Backward compatibility: callers that don't send `channel` are treated
          # as stable, but only if the version matches the stable SemVer pattern
          # (^x.y.z$). This prevents a pre-release from silently landing on the
          # stable formula.
          if [ -z "$CHANNEL_RAW" ]; then
            if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              CHANNEL="stable"
              echo "ℹ️ channel not provided — defaulted to 'stable' (version matches stable pattern)"
            else
              echo "Error: channel not provided and version '$VERSION' does not match the stable" >&2
              echo "       pattern (^[0-9]+\\.[0-9]+\\.[0-9]+\$). Refusing to default to stable for" >&2
              echo "       a pre-release version. Please pass channel explicitly." >&2
              exit 1
            fi
          else
            CHANNEL="$CHANNEL_RAW"
          fi

          if [ -z "$VERSION" ] || [ -z "$SHA256_AARCH64" ] || [ -z "$SHA256_X86_64" ] \
             || [ -z "$SHA256_LINUX_AARCH64" ] || [ -z "$SHA256_LINUX_X86_64" ]; then
            echo "Error: version, sha256_aarch64, sha256_x86_64, sha256_linux_aarch64 and" >&2
            echo "       sha256_linux_x86_64 are all required" >&2
            exit 1
          fi

          {
            echo "version=$VERSION"
            echo "channel=$CHANNEL"
            echo "sha256_aarch64=$SHA256_AARCH64"
            echo "sha256_x86_64=$SHA256_X86_64"
            echo "sha256_linux_aarch64=$SHA256_LINUX_AARCH64"
            echo "sha256_linux_x86_64=$SHA256_LINUX_X86_64"
          } >> "$GITHUB_OUTPUT"

          echo "Updating kobe to v$VERSION (channel: $CHANNEL)"

      - name: Resolve formula file from channel
        id: formula
        env:
          CHANNEL: ${{ steps.params.outputs.channel }}
        run: |
          set -euo pipefail
          case "$CHANNEL" in
            stable)
              echo "file=Formula/kobe.rb"           >> "$GITHUB_OUTPUT"
              echo "class=Kobe"                      >> "$GITHUB_OUTPUT"
              echo "label=kobe"                      >> "$GITHUB_OUTPUT"
              echo "desc=Cluster pool operator CLI for instant CI/dev cluster provisioning" >> "$GITHUB_OUTPUT"
              ;;
            unstable)
              echo "file=Formula/kobe-unstable.rb"   >> "$GITHUB_OUTPUT"
              echo "class=KobeUnstable"              >> "$GITHUB_OUTPUT"
              echo "label=kobe (unstable)"           >> "$GITHUB_OUTPUT"
              echo "desc=Cluster pool operator CLI for instant CI/dev cluster provisioning (unstable)" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Error: unknown channel '$CHANNEL' (expected stable or unstable)" >&2
              exit 1
              ;;
          esac

      - name: Render formula
        env:
          VERSION: ${{ steps.params.outputs.version }}
          CHANNEL: ${{ steps.params.outputs.channel }}
          SHA256_AARCH64: ${{ steps.params.outputs.sha256_aarch64 }}
          SHA256_X86_64: ${{ steps.params.outputs.sha256_x86_64 }}
          SHA256_LINUX_AARCH64: ${{ steps.params.outputs.sha256_linux_aarch64 }}
          SHA256_LINUX_X86_64: ${{ steps.params.outputs.sha256_linux_x86_64 }}
          FORMULA_FILE: ${{ steps.formula.outputs.file }}
          FORMULA_CLASS: ${{ steps.formula.outputs.class }}
          FORMULA_DESC: ${{ steps.formula.outputs.desc }}
        run: |
          set -euo pipefail
          mkdir -p Formula
          cat > "$FORMULA_FILE" <<EOF
          class ${FORMULA_CLASS} < Formula
            desc "${FORMULA_DESC}"
            homepage "https://github.com/kunobi-ninja/kobe"
            version "${VERSION}"

            on_macos do
              on_arm do
                url "https://github.com/kunobi-ninja/kobe/releases/download/v${VERSION}/kobe-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA256_AARCH64}"
              end
              on_intel do
                url "https://github.com/kunobi-ninja/kobe/releases/download/v${VERSION}/kobe-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA256_X86_64}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/kunobi-ninja/kobe/releases/download/v${VERSION}/kobe-aarch64-unknown-linux-musl.tar.gz"
                sha256 "${SHA256_LINUX_AARCH64}"
              end
              on_intel do
                url "https://github.com/kunobi-ninja/kobe/releases/download/v${VERSION}/kobe-x86_64-unknown-linux-musl.tar.gz"
                sha256 "${SHA256_LINUX_X86_64}"
              end
            end

            def install
              bin.install "kobe"
            end

            test do
              system bin/"kobe", "--version"
            end
          end
          EOF

          # Homebrew scans the version from the stable GitHub release URL
          # (.../download/vX.Y.Z/...), so an explicit \`version\` stanza is
          # redundant there and \`brew audit --strict\` flags it. Pre-release
          # tags (rc/beta) are NOT scanned the same way, so the stanza stays for
          # the unstable channel.
          if [ "$CHANNEL" = "stable" ]; then
            sed -i.bak '/^  version "/d' "$FORMULA_FILE"
            rm -f "${FORMULA_FILE}.bak"
          fi

          echo "Rendered $FORMULA_FILE:"
          cat "$FORMULA_FILE"

      - name: Check for changes
        id: diff
        env:
          FORMULA_FILE: ${{ steps.formula.outputs.file }}
        run: |
          set -euo pipefail
          # `git diff` only considers TRACKED files. On the FIRST render of a
          # formula the file is brand new and untracked, so a bare `git diff`
          # reports "no change" — changed=false, validate/create-pr skip, and the
          # formula is silently discarded. `--intent-to-add` registers the new
          # path with the index so the diff can see it. Tracked formulas are
          # unaffected: an unchanged one still diffs clean.
          git add --intent-to-add "$FORMULA_FILE"
          if git diff --quiet -- "$FORMULA_FILE"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ Formula already up to date, skipping"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push update branch
        if: steps.diff.outputs.changed == 'true'
        id: branch
        env:
          VERSION: ${{ steps.params.outputs.version }}
          CHANNEL: ${{ steps.params.outputs.channel }}
          FORMULA_FILE: ${{ steps.formula.outputs.file }}
          FORMULA_LABEL: ${{ steps.formula.outputs.label }}
        run: |
          set -euo pipefail
          BRANCH="update-kobe-${CHANNEL}-${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add "$FORMULA_FILE"
          git commit -m "Update ${FORMULA_LABEL} to v${VERSION}"
          git push --force-with-lease origin "$BRANCH"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

  # Step 2: validate the rendered formula (download every macOS + Linux tarball,
  # verify each SHA256) before anything can be merged.
  validate:
    needs: update-formula
    if: needs.update-formula.outputs.changed == 'true'
    uses: ./.github/workflows/validate-formula.yaml
    with:
      ref: ${{ needs.update-formula.outputs.branch }}
      formula_file: ${{ needs.update-formula.outputs.formula_file }}

  # Cleanup: delete the update branch if validation failed.
  cleanup:
    needs: [update-formula, validate]
    if: >-
      always()
      && needs.validate.result == 'failure'
      && needs.update-formula.outputs.branch != ''
      && needs.update-formula.outputs.branch != 'main'
      && needs.update-formula.outputs.branch != 'master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete failed branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ needs.update-formula.outputs.branch }}
        run: |
          gh api -X DELETE "repos/$GITHUB_REPOSITORY/git/refs/heads/$BRANCH" || true
          echo "🧹 Deleted branch $BRANCH after failed validation"

  # Step 3: open a PR only once validation passes.
  create-pr:
    needs: [update-formula, validate]
    if: needs.update-formula.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.update-formula.outputs.version }}
          CHANNEL: ${{ needs.update-formula.outputs.channel }}
          FORMULA_LABEL: ${{ needs.update-formula.outputs.formula_label }}
          BRANCH: ${{ needs.update-formula.outputs.branch }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh pr create \
            --repo "$GITHUB_REPOSITORY" \
            --head "$BRANCH" \
            --base main \
            --title "Update ${FORMULA_LABEL} to v${VERSION}" \
            --body "$(cat <<EOF
          > 🤖 Auto-generated and validated by [update-kobe-formula](${RUN_URL}) workflow

          - **Formula**: \`${FORMULA_LABEL}\` (channel: \`${CHANNEL}\`)
          - **Version**: \`${VERSION}\`
          - **Tarball checksums**: ✅ Verified (macOS + Linux, aarch64 + x86_64)
          EOF
          )"
